version: '3.8'\n\nservices:\n  postgres:\n    image: postgres:latest\n    environment:\n      POSTGRES_USER: user\n      POSTGRES_PASSWORD: password\n      POSTGRES_DB: radius\n    volumes:\n      - pgdata:/var/lib/postgresql/data\n    ports:\n      - '5432:5432'\n  freeradius:\n    image: freeradius/freeradius-server:latest\n    ports:\n      - '1812:1812/udp'\n      - '1813:1813/udp'\n  integration_service:\n    build: .\n    ports:\n      - '8080:8080'\n    depends_on:\n      - postgres\n      - freeradius\n  pgadmin:\n    image: dpage/pgadmin4:latest\n    environment:\n      PGADMIN_DEFAULT_EMAIL: admin@admin.com\n      PGADMIN_DEFAULT_PASSWORD: admin\n    ports:\n      - '8081:80'\n\nvolumes:\n  pgdata: {}